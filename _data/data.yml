experiences:
  title: Experiences
  info:
  - role: Policy Analyst / Foresight (Visiting Scientist)
    time: 04/2026 - 09/2026
    company: Joint Research Centre (JRC) — European Commission, Brussels
    details: |
      Intern in the EU Policy Lab of the Joint Research Center (JRC), supporting corporate
      decision-making through future scenario creation and foresight methodologies,
      alongside sustainability assessment, data analysis, and regulatory support.

  - role: PhD Student (Marie Skłodowska-Curie Actions)
    time: 09/2023 - Present
    company: Empa, St. Gallen — Switzerland
    details: |
      Research focus on Life Cycle Assessment (LCA), Environmental Risk Assessment,
      Occupational Safety, and Social LCA in pharmaceutical and nanomaterial development.
      Contributing to Safe and Sustainable by Design (SSbD) frameworks. Partner in the
      EU-funded MELOMANES project on sustainable nanomedicine innovation.
        - Led two collaborative projects with Roche: an LCA and energy calculation master's thesis,
          and an SSbD case study on a Roche pharmaceutical product.
        - Developed a software tool to support energy calculations for chemical and industrial processes.

  - role: Research & Development Intern — LCA Analysis
    time: 02/2023 - 07/2023
    company: GVS Filter Technology, Bologna
    details: |
      Conducted comprehensive Life Cycle Assessment (LCA) and Mass Flow analysis for medical
      device production processes using SimaPro. Researched innovative production processes,
      contributing to sustainable practices in medical device manufacturing.

  - role: Participant — Climate Leadership Journey
    time: 04/2022 - 12/2022
    company: Climate-KIC, Lisbon
    details: |
      Developed system thinking skills within a multicultural and interdisciplinary group.
      Proposed ideas through innovation and leadership to facilitate the net-zero goal of Lisbon.

  - role: EBU Label Program — Bioeconomy Qualification
    time: 04/2022 - 06/2022
    company: European Bioeconomy University (EBU), Bologna
    details: |
      Common qualification supplement offered by the six EBU partner universities, covering
      cross-sectoral mindset, inter- and trans-disciplinarity, critical thinking, creativity,
      problem-solving, and sustainability transformation knowledge.

