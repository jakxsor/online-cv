career-profile:
  title: Career Profile
  summary: |
    PhD researcher (Marie Skłodowska-Curie Actions) at Empa / ETH Zürich, focused on Life Cycle
    Assessment (LCA), Environmental Risk Assessment, Occupational Safety, and Social LCA in
    pharmaceutical and nanomaterial development. Contributing to the design and implementation of
    Safe and Sustainable by Design (SSbD) frameworks. Currently visiting scientist at the EU Joint
    Research Center (JRC) in Brussels, supporting corporate decision-making through foresight
    methodologies and sustainability assessment. Passionate about integrating nanomaterials into
    SSbD frameworks and leveraging interdisciplinary collaboration for sustainable innovation.

